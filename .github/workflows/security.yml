name: Security

# Runs scans in parallel:
#   sast      — SecObserve: Semgrep (security-audit + owasp) + ESLint + Checkov
#   sca       — SecObserve: Trivy filesystem + Grype + pnpm audit
#   dast      — SecObserve: CryptoLyzer + ZAP baseline (requires DAST_TARGET_URL var)
#   secrets   — Gitleaks full-history secret detection (DISABLED)
#   gitxray   — Supply-chain / repo-health OSINT scan → HTML report
#
# SecObserve import is disabled (so_upload: 'false') — scanners run locally
# and results are saved as artifacts only. Enable upload by setting
# SO_API_BASE_URL / SO_API_TOKEN / SO_PRODUCT_NAME as repo secrets and
# flipping so_upload to 'true' in each step.
#
# DAST scans require a live deployment URL. Set a DAST_TARGET_URL repository
# variable (e.g. https://staging.example.com) to enable the dast job.
#
# NOTE: PQBench (Comcast/CARAF) is a PQC benchmarking methodology framework,
# not a runnable scanner. Its evaluation metrics are applied to the existing
# Argon2id benchmark at packages/core/scripts/bench-argon2id.mjs.

on:
  schedule:
    - cron: '0 3 * * 1' # every Monday at 03:00 UTC
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'packages/**'
      - 'packages/extension/manifest.json'
      - '.github/workflows/security.yml'

permissions:
  contents: read

jobs:
  # ── 1. SAST ────────────────────────────────────────────────────────────────
  sast:
    name: SAST (semgrep + eslint + checkov)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Semgrep (security-audit + OWASP Top 10)
        uses: SecObserve/secobserve_actions_templates/actions/SAST/semgrep@main
        with:
          target: 'packages'
          report_name: 'semgrep-report.json'
          configuration: 'p/security-audit p/owasp-top-ten'
          so_upload: 'false'
          so_api_base_url: ${{ vars.SO_API_BASE_URL || '' }}
          so_api_token: ${{ secrets.SO_API_TOKEN || '' }}
          so_product_name: ${{ vars.SO_PRODUCT_NAME || 'e2e-anywhere' }}
        continue-on-error: true

      - name: ESLint
        uses: SecObserve/secobserve_actions_templates/actions/SAST/eslint@main
        with:
          run_directory: '.'
          target: 'packages'
          report_name: 'eslint-report.sarif'
          so_upload: 'false'
          so_api_base_url: ${{ vars.SO_API_BASE_URL || '' }}
          so_api_token: ${{ secrets.SO_API_TOKEN || '' }}
          so_product_name: ${{ vars.SO_PRODUCT_NAME || 'e2e-anywhere' }}
        continue-on-error: true

      - name: Checkov (IaC + manifest hygiene)
        uses: SecObserve/secobserve_actions_templates/actions/SAST/checkov@main
        with:
          target: '.'
          report_name: 'checkov-report.sarif'
          so_upload: 'false'
          so_api_base_url: ${{ vars.SO_API_BASE_URL || '' }}
          so_api_token: ${{ secrets.SO_API_TOKEN || '' }}
          so_product_name: ${{ vars.SO_PRODUCT_NAME || 'e2e-anywhere' }}
        continue-on-error: true

      - name: Upload SAST reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sast-reports
          path: |
            semgrep-report.json
            eslint-report.sarif
            checkov-report.sarif
          retention-days: 30

  # ── 2. SCA ─────────────────────────────────────────────────────────────────
  sca:
    name: SCA (trivy + grype + pnpm audit)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: pnpm audit
        run: pnpm audit --json > pnpm-audit.json
        continue-on-error: true

      - name: Trivy filesystem scan
        uses: SecObserve/secobserve_actions_templates/actions/SCA/trivy_filesystem@main
        with:
          target: '.'
          report_name: 'trivy-report.json'
          so_upload: 'false'
          so_api_base_url: ${{ vars.SO_API_BASE_URL || '' }}
          so_api_token: ${{ secrets.SO_API_TOKEN || '' }}
          so_product_name: ${{ vars.SO_PRODUCT_NAME || 'e2e-anywhere' }}
        continue-on-error: true

      - name: Grype filesystem scan
        uses: SecObserve/secobserve_actions_templates/actions/SCA/grype_image@main
        with:
          # grype accepts dir: prefix for local filesystem targets
          target: 'dir:.'
          report_name: 'grype-report.json'
          so_upload: 'false'
          so_api_base_url: ${{ vars.SO_API_BASE_URL || '' }}
          so_api_token: ${{ secrets.SO_API_TOKEN || '' }}
          so_product_name: ${{ vars.SO_PRODUCT_NAME || 'e2e-anywhere' }}
        continue-on-error: true

      - name: Upload SCA reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sca-reports
          path: |
            pnpm-audit.json
            trivy-report.json
            grype-report.json
          retention-days: 30

  # ── 3. DAST ────────────────────────────────────────────────────────────────
  dast:
    name: DAST (cryptolyzer + zap)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    continue-on-error: true
    # Requires a live deployment. Set DAST_TARGET_URL as a repository variable
    # (e.g. https://staging.example.com) to enable this job.
    if: ${{ vars.DAST_TARGET_URL != '' }}

    steps:
      - uses: actions/checkout@v4

      - name: CryptoLyzer (TLS/cipher analysis)
        uses: SecObserve/secobserve_actions_templates/actions/DAST/cryptolyzer@main
        with:
          # CryptoLyzer expects a bare hostname, not a URL
          target: ${{ vars.DAST_TARGET_HOST || vars.DAST_TARGET_URL }}
          report_name: 'cryptolyzer-report.json'
          so_upload: 'false'
          so_api_base_url: ${{ vars.SO_API_BASE_URL || '' }}
          so_api_token: ${{ secrets.SO_API_TOKEN || '' }}
          so_product_name: ${{ vars.SO_PRODUCT_NAME || 'e2e-anywhere' }}
        continue-on-error: true

      - name: ZAP baseline scan
        uses: SecObserve/secobserve_actions_templates/actions/DAST/zap@main
        with:
          target: ${{ vars.DAST_TARGET_URL }}
          report_name: 'zap-report.json'
          # script defaults to zap-baseline.py — passive scan only, no active attack
          so_upload: 'false'
          so_api_base_url: ${{ vars.SO_API_BASE_URL || '' }}
          so_api_token: ${{ secrets.SO_API_TOKEN || '' }}
          so_product_name: ${{ vars.SO_PRODUCT_NAME || 'e2e-anywhere' }}
        continue-on-error: true

      - name: Upload DAST reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dast-reports
          path: |
            cryptolyzer-report.json
            zap-report.json
          retention-days: 30

  # ── 4. Secret detection ────────────────────────────────────────────────────
  secrets:
    name: Secret detection (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    if: false # disabled — re-enable by removing this line

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history required for git-log scanning

      - name: Gitleaks
        uses: SecObserve/secobserve_actions_templates/actions/secrets/gitleaks@main
        with:
          report_name: 'gitleaks.sarif'
          so_upload: 'false'
          so_api_base_url: ${{ vars.SO_API_BASE_URL || '' }}
          so_api_token: ${{ secrets.SO_API_TOKEN || '' }}
          so_product_name: ${{ vars.SO_PRODUCT_NAME || 'e2e-anywhere' }}
        continue-on-error: true

      - name: Upload Gitleaks report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: secrets-gitleaks
          path: gitleaks.sarif
          retention-days: 30

  # ── 4. Gitxray ─────────────────────────────────────────────────────────────
  gitxray:
    name: Supply-chain scan (gitxray)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install gitxray
        run: pip install gitxray

      - name: Run gitxray
        # Scans the repo for supply-chain warnings: tampered release assets,
        # suspicious contributor patterns, leaked keys in PGP/SSH profiles, etc.
        # GH_ACCESS_TOKEN increases the GitHub API rate limit from 60 to 5000 req/hr.
        run: |
          gitxray \
            -r "https://github.com/${{ github.repository }}" \
            -f warning \
            -outformat html \
            -out gitxray-report.html \
            --shush
        env:
          GH_ACCESS_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Upload gitxray HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gitxray-report
          path: gitxray-report.html
          retention-days: 30
