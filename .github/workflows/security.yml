name: Security

# Runs scans in parallel:
#   sast      — Semgrep (security-audit + owasp) + ESLint + Checkov
#   sca       — Trivy filesystem (JSON) + Grype + pnpm audit
#   dast      — CryptoLyzer + ZAP baseline (requires DAST_TARGET_URL var)
#   secrets   — Gitleaks full-history secret detection (DISABLED)
#   gitxray   — Supply-chain / repo-health OSINT scan → HTML report
#
# DAST scans require a live deployment URL. Set a DAST_TARGET_URL repository
# variable (e.g. https://staging.example.com) to enable the dast job.
# CryptoLyzer needs a bare hostname; set DAST_TARGET_HOST if that differs
# from the URL host (e.g. staging.example.com vs https://staging.example.com).
#
# NOTE: PQBench (Comcast/CARAF) is a PQC benchmarking methodology framework,
# not a runnable scanner. Its evaluation metrics are applied to the existing
# Argon2id benchmark at packages/core/scripts/bench-argon2id.mjs.

on:
  schedule:
    - cron: '0 3 * * 1' # every Monday at 03:00 UTC
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'packages/**'
      - 'packages/extension/manifest.json'
      - '.github/workflows/security.yml'

permissions:
  contents: read

jobs:
  # ── 1. SAST ────────────────────────────────────────────────────────────────
  sast:
    name: SAST (semgrep + eslint + checkov)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pnpm install --frozen-lockfile

      - name: Install Python scanners
        run: pip install semgrep checkov

      - name: Semgrep (security-audit + OWASP Top 10)
        run: |
          semgrep scan \
            --config p/security-audit \
            --config p/owasp-top-ten \
            --json \
            --output semgrep-report.json \
            packages/
        continue-on-error: true

      - name: ESLint
        run: |
          pnpm exec eslint \
            --format json \
            --output-file eslint-report.json \
            'packages/**/*.ts'
        continue-on-error: true

      - name: Checkov (IaC + manifest hygiene)
        run: |
          checkov \
            --directory . \
            --output json \
            --output-file-path . \
            --quiet
        continue-on-error: true

      - name: Upload SAST reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sast-reports
          path: |
            semgrep-report.json
            eslint-report.json
            results_*.json
          retention-days: 30

  # ── 2. SCA ─────────────────────────────────────────────────────────────────
  sca:
    name: SCA (trivy + grype + pnpm audit)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: pnpm audit
        run: pnpm audit --json > pnpm-audit.json
        continue-on-error: true

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scanners: vuln,secret
          format: json
          output: trivy-report.json
          exit-code: '0'
        continue-on-error: true

      - name: Grype filesystem scan
        uses: anchore/scan-action@v6
        with:
          path: '.'
          output-format: json
          fail-build: false
        continue-on-error: true

      - name: Upload SCA reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sca-reports
          path: |
            pnpm-audit.json
            trivy-report.json
            results.json
          retention-days: 30

  # ── 3. DAST ────────────────────────────────────────────────────────────────
  dast:
    name: DAST (cryptolyzer + zap)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    continue-on-error: true
    # Requires a live deployment. Set DAST_TARGET_URL as a repository variable
    # (e.g. https://staging.example.com) to enable this job.
    if: ${{ vars.DAST_TARGET_URL != '' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install CryptoLyzer
        run: pip install cryptolyzer

      - name: CryptoLyzer (TLS/cipher analysis)
        # CryptoLyzer expects a bare hostname, not a URL.
        # Set DAST_TARGET_HOST if it differs from the URL host.
        run: |
          cryptolyze tls all \
            "${{ vars.DAST_TARGET_HOST || vars.DAST_TARGET_URL }}" \
            --output-format json \
            > cryptolyzer-report.json
        continue-on-error: true

      - name: ZAP baseline scan (passive only)
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: ${{ vars.DAST_TARGET_URL }}
          fail_action: false
          artifact_name: zap-report
        continue-on-error: true

      - name: Upload DAST reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dast-reports
          path: cryptolyzer-report.json
          retention-days: 30

  # ── 4. Secret detection ────────────────────────────────────────────────────
  secrets:
    name: Secret detection (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    if: false # disabled — re-enable by removing this line

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history required for git-log scanning

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Upload Gitleaks report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: secrets-gitleaks
          path: results.sarif
          retention-days: 30

  # ── 5. Gitxray ─────────────────────────────────────────────────────────────
  gitxray:
    name: Supply-chain scan (gitxray)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install gitxray
        run: pip install gitxray

      - name: Run gitxray
        # Scans the repo for supply-chain warnings: tampered release assets,
        # suspicious contributor patterns, leaked keys in PGP/SSH profiles, etc.
        # GH_ACCESS_TOKEN increases the GitHub API rate limit from 60 to 5000 req/hr.
        run: |
          gitxray \
            -r "https://github.com/${{ github.repository }}" \
            -f warning \
            -outformat html \
            -out gitxray-report.html \
            --shush
        env:
          GH_ACCESS_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Upload gitxray HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gitxray-report
          path: gitxray-report.html
          retention-days: 30
