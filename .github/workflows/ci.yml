name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality-and-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Release blocker docs present
        run: |
          test -f docs/security/threat-model.md
          test -f docs/security/security-invariants.md
          test -f docs/privacy/data-classification.md
          test -f docs/privacy/privacy-policy-draft.md

      - name: Lint (Oxlint)
        run: pnpm lint

      - name: Format check (Oxfmt)
        run: pnpm format:check

      - name: Typecheck (tsc --noEmit)
        run: pnpm typecheck

      - name: Test (Vitest)
        run: pnpm test

      - name: Build (Vite)
        run: pnpm build

      - name: Dependency audit (high/critical)
        run: pnpm audit
