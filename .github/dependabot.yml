version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: 'UTC'
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - security
    reviewers:
      - selfagency
    commit-message:
      prefix: chore
      include: scope
